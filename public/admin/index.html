<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SemaTranslate 用量管理</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="layout">
    <header class="header">
      <div class="header-left">
        <h1>SemaTranslate 用量管理</h1>
        <p class="subtitle">查看与管理每个用户的 Token 用量、配额与费用</p>
      </div>
      <div class="header-actions">
        <button type="button" id="btnRefresh" class="btn btn-primary">刷新</button>
        <button type="button" id="btnSettings" class="btn btn-ghost">连接设置</button>
      </div>
    </header>

    <section id="settingsPanel" class="settings-panel hidden">
      <h2>连接设置</h2>
      <div class="form-grid">
        <label>
          后端地址
          <input id="inputBackend" type="url" placeholder="https://your-backend.railway.app" />
        </label>
        <label>
          管理员用户名
          <input id="inputAdminUser" type="text" placeholder="与 SEMA_ADMIN_USERS 中一致" />
        </label>
      </div>
      <p class="hint">
        配额修改写入 Railway 持久化卷的 <code>quotas.json</code>，立即生效，无需 redeploy。
        优先级：面板设置 &gt; 环境变量 <code>SEMA_USER_QUOTAS</code>。
      </p>
      <div class="settings-actions">
        <button type="button" id="btnSaveSettings" class="btn btn-primary">保存并加载</button>
        <button type="button" id="btnCloseSettings" class="btn btn-ghost">关闭</button>
      </div>
    </section>

    <section id="statusBar" class="status-bar hidden"></section>

    <section class="toolbar">
      <div class="toolbar-left">
        <div class="period-toggle" role="group" aria-label="统计粒度">
          <label class="period-option">
            <input type="radio" name="periodMode" value="month" checked />
            按月
          </label>
          <label class="period-option">
            <input type="radio" name="periodMode" value="day" />
            按日
          </label>
        </div>
        <label id="monthPickerWrap" class="period-picker">
          月份
          <select id="selectMonth"></select>
        </label>
        <label id="dayPickerWrap" class="period-picker hidden">
          日期
          <input id="selectDay" type="date" />
        </label>
      </div>
      <span id="lastUpdated" class="last-updated"></span>
    </section>

    <section id="summaryCards" class="summary-cards"></section>

    <section class="table-section">
      <div class="table-header">
        <h2>用户用量明细</h2>
        <input id="inputSearch" type="search" placeholder="搜索用户名…" />
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th data-sort="user">用户</th>
              <th data-sort="requests" class="num">请求数</th>
              <th data-sort="inputTokens" class="num">输入 Token</th>
              <th data-sort="outputTokens" class="num">输出 Token</th>
              <th data-sort="totalTokens" class="num">总 Token</th>
              <th data-sort="costCny" class="num">费用 (¥)</th>
              <th data-sort="quota" class="num">配额</th>
              <th>用量</th>
              <th>路由分布</th>
              <th>最近更新</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="userTableBody">
            <tr><td colspan="11" class="empty">正在加载…</td></tr>
          </tbody>
        </table>
      </div>
    </section>
  </div>

  <dialog id="quotaDialog" class="modal">
    <form id="quotaForm" method="dialog">
      <h2 id="quotaDialogTitle">编辑配额</h2>
      <p class="modal-user" id="quotaDialogUser"></p>
      <label class="checkbox-row">
        <input type="checkbox" id="quotaUnlimited" />
        无限制
      </label>
      <label>
        月度 Token 上限
        <input id="quotaInput" type="number" min="1" step="1000" placeholder="例如 500000" />
      </label>
      <p class="hint" id="quotaSourceHint"></p>
      <div class="modal-actions">
        <button type="submit" class="btn btn-primary">保存</button>
        <button type="button" id="btnClearQuotaOverride" class="btn btn-ghost">恢复为环境变量</button>
        <button type="button" id="btnCancelQuota" class="btn btn-ghost">取消</button>
      </div>
    </form>
  </dialog>

  <dialog id="adjustDialog" class="modal">
    <form id="adjustForm" method="dialog">
      <h2>充值 / 减配</h2>
      <p class="modal-user" id="adjustDialogUser"></p>
      <label>
        调整量（Token）
        <input id="adjustDelta" type="number" step="10000" placeholder="正数充值，负数减配，如 100000" required />
      </label>
      <p class="hint">在当前配额基础上加减。若原为无限制，则从 0 起算新配额。</p>
      <div class="modal-actions">
        <button type="submit" class="btn btn-primary">确认</button>
        <button type="button" id="btnCancelAdjust" class="btn btn-ghost">取消</button>
      </div>
    </form>
  </dialog>

  <script src="app.js"></script>
</body>
</html>
